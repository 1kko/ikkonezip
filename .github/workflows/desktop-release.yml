name: Desktop Release

on:
  push:
    tags:
      - 'v*-desktop'

jobs:
  build:
    name: Build universal DMG
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install web deps and build SPA
        run: |
          npm ci
          npm run build

      - name: Install Tauri CLI
        run: |
          cd app
          npm ci

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build universal DMG
        run: |
          cd app
          npx tauri build --target universal-apple-darwin

      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(find app/src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      - name: Inject 실행방법.txt into DMG
        run: |
          set -e
          DMG="${{ steps.dmg.outputs.path }}"
          RW_DMG="${DMG%.dmg}-rw.dmg"
          MOUNT="/tmp/dmg-mount-$$"
          # Convert read-only DMG to read-write so we can add files
          hdiutil convert "$DMG" -format UDRW -o "$RW_DMG"
          # Mount it
          mkdir -p "$MOUNT"
          hdiutil attach -nobrowse -mountpoint "$MOUNT" "$RW_DMG"
          # Copy in the install instructions; this puts the .txt next to the
          # .app icon when the user mounts the DMG in Finder.
          cp app/dmg-resources/실행방법.txt "$MOUNT/실행방법.txt"
          # Detach
          hdiutil detach "$MOUNT"
          # Convert back to compressed read-only, replacing the original
          rm -f "$DMG"
          hdiutil convert "$RW_DMG" -format UDZO -o "$DMG"
          rm -f "$RW_DMG"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG%-desktop}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Desktop ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.dmg.outputs.path }}

      - name: Update desktop-latest.json
        run: |
          # Query the ACTUAL uploaded asset name — GitHub strips non-ASCII chars
          # at upload time, so the local DMG filename (e.g. "이코네Zip_*.dmg")
          # differs from the public asset name (e.g. "Zip_*.dmg").
          ASSET_NAME=$(gh release view "${{ steps.version.outputs.tag }}" --json assets --jq '[.assets[] | select(.name | endswith(".dmg"))][0].name')
          # Manifest URL points at our own domain — the DMG is mirrored into the
          # Coolify nginx image at build time (see Dockerfile). GitHub Releases
          # remains the source-of-truth archive for the Dockerfile to fetch from.
          DOWNLOAD_URL="https://zip.1kko.com/desktop/$ASSET_NAME"
          NOTES=$(gh release view "${{ steps.version.outputs.tag }}" --json body --jq '.body // "" | .[0:280]')
          jq -n \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg url "$DOWNLOAD_URL" \
            --arg notes "$NOTES" \
            --arg releasedAt "$(date -u +%Y-%m-%d)" \
            '{version: $version, downloadUrl: $url, notes: $notes, releasedAt: $releasedAt}' \
            > public/desktop-latest.json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit and push desktop-latest.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # actions/checkout left us in detached-HEAD on the tag SHA — create
          # a local main tracking the remote so we can commit + push.
          git fetch origin main
          MANIFEST=$(cat public/desktop-latest.json)
          git checkout -B main origin/main
          printf '%s' "$MANIFEST" > public/desktop-latest.json
          git add public/desktop-latest.json
          # Retry-on-race in case another commit landed during the build.
          for attempt in 1 2 3; do
            git commit -m "Update desktop-latest.json for ${{ steps.version.outputs.tag }}" || true
            if git push origin main; then break; fi
            git pull --rebase origin main || true
          done
