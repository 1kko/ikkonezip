version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Bundle dev tooling minor/patch updates so we don't get 10 PRs every
      # week. Majors come as individual PRs — bundling 5+ breaking changes
      # in one PR (as happened with #10) makes triage impossible when one
      # of them has a peer-dep conflict.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Bundle React + types together — usually need to upgrade in lockstep
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # ESLint core + companion packages MUST bump together: @eslint/js
      # peer-depends on matching eslint major, and typescript-eslint
      # tracks eslint compatibility as a release gate. Solo bumps always
      # fail ERESOLVE (see closed #22/#23).
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # GitHub Actions in workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
